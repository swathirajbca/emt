<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Traditional South Indian temple at sunrise</title>
  <desc id="desc">A decorative maroon and gold temple silhouette with lotus motifs and a warm ceremonial glow.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d3044"/>
      <stop offset="0.48" stop-color="#d9aa63"/>
      <stop offset="1" stop-color="#f9e4c5"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="38%" r="42%">
      <stop offset="0" stop-color="#fff6cf" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#e8d399" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#e8d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f1d98a"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a9821f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="kolam" width="140" height="140" patternUnits="userSpaceOnUse">
      <path d="M10 70c20-30 40-30 60 0s40 30 60 0M70 10c-30 20-30 40 0 60s30 40 0 60" fill="none" stroke="#f9e4c5" stroke-opacity="0.12" stroke-width="2"/>
      <circle cx="70" cy="70" r="5" fill="#d4af37" fill-opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="1600" height="1200" fill="url(#sky)"/>
  <rect width="1600" height="1200" fill="url(#sun)"/>
  <circle cx="800" cy="390" r="220" fill="#fff2c2" opacity="0.2" filter="url(#soft)"/>
  <rect width="1600" height="1200" fill="url(#kolam)"/>

  <g opacity="0.22" fill="#4a1220">
    <path d="M0 920C180 800 300 830 440 920s300 100 470-20 380-80 690 50v250H0z"/>
    <path d="M0 990c240-70 420-35 590 40s380 50 560-20 300-40 450 20v170H0z" opacity="0.65"/>
  </g>

  <g transform="translate(800 820)" fill="#4a1220" stroke="url(#gold)" stroke-width="6" stroke-linejoin="round">
    <path d="M-460 220h920v160h-920z"/>
    <path d="M-380 220v-135h760v135z"/>
    <path d="M-320 85v-120h640V85z"/>
    <path d="M-250-35v-110h500v110z"/>
    <path d="M-185-145v-100h370v100z"/>
    <path d="M-125-245v-90h250v90z"/>
    <path d="M-75-335v-80H75v80z"/>
    <path d="M-30-415v-70H30v70z"/>
    <path d="M0-535l34 50h-68z"/>
  </g>

  <g transform="translate(800 805)" fill="url(#gold)" opacity="0.9">
    <circle cx="0" cy="-445" r="11"/>
    <circle cx="-94" cy="-290" r="9"/><circle cx="94" cy="-290" r="9"/>
    <circle cx="-155" cy="-190" r="10"/><circle cx="155" cy="-190" r="10"/>
    <circle cx="-225" cy="-80" r="11"/><circle cx="225" cy="-80" r="11"/>
    <circle cx="-300" cy="45" r="12"/><circle cx="300" cy="45" r="12"/>
  </g>

  <g transform="translate(800 940)">
    <path d="M-68 180v-170c0-48 30-84 68-84s68 36 68 84v170z" fill="#240911" stroke="url(#gold)" stroke-width="7"/>
    <path d="M-35 180V30c0-23 16-43 35-43s35 20 35 43v150z" fill="#100407" opacity="0.9"/>
    <circle cx="0" cy="-35" r="11" fill="#f1d98a"/>
  </g>

  <g fill="url(#gold)" opacity="0.95">
    <path d="M180 1080c32-54 74-54 106 0-38-15-68-15-106 0z"/>
    <path d="M1420 1080c-32-54-74-54-106 0 38-15 68-15 106 0z"/>
    <path d="M245 1120c18-42 48-64 78-72-3 36-28 67-78 72z" opacity="0.65"/>
    <path d="M1355 1120c-18-42-48-64-78-72 3 36 28 67 78 72z" opacity="0.65"/>
